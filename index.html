<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Binding of Isaac</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* This container tells Ruffle to be as big as possible 
           without cutting off the edges of the game */
        #ruffle-container {
            width: 100vw; 
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Target the actual Ruffle player element */
        #ruffle-container ruffle-player {
            width: 100%;
            height: 100%;
            /* Isaac's native ratio is roughly 1.75:1 */
            aspect-ratio: 1000 / 572; 
        }
    </style>
</head>
<body>

    <div id="ruffle-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);
            
            player.load({
                url: "https://trapjawws.github.io/josh/The%20Binding%20of%20Isaac.swf",
                allowScriptAccess: true,
                // "fill" makes it take up the container space we defined in CSS
                scale: "showAll", 
                quality: "high"
            });

            player.focus();
        });
    </script>
</body>
</html>
