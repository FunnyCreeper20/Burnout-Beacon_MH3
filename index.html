<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isaac Mobile</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #1a1a1a; overflow: hidden;
            font-family: sans-serif;
        }

        #ruffle-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 1000 / 572;
            background: #000;
        }

        .controls-container {
            display: none; /* Hidden on desktop */
            width: 95%;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        @media (pointer: coarse) { .controls-container { display: flex; } }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
        }

        .center-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ctrl-btn {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #888;
            color: white; border-radius: 12px;
            font-weight: bold; font-size: 18px;
            touch-action: none; user-select: none;
        }

        .wide-btn { width: 100px; height: 50px; border-radius: 25px; }
        .ctrl-btn:active { background: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>

    <div id="ruffle-container"></div>

    <div class="controls-container">
        <div class="d-pad">
            <div></div><button class="ctrl-btn" id="move-up">W</button><div></div>
            <button class="ctrl-btn" id="move-left">A</button>
            <button class="ctrl-btn" id="move-down">S</button>
            <button class="ctrl-btn" id="move-right">D</button>
        </div>

        <div class="center-buttons">
            <button class="ctrl-btn wide-btn" id="btn-space">SPACE</button>
            <button class="ctrl-btn wide-btn" id="btn-shift">SHIFT</button>
        </div>

        <div class="d-pad">
            <div></div><button class="ctrl-btn" id="shoot-up">↑</button><div></div>
            <button class="ctrl-btn" id="shoot-left">←</button>
            <button class="ctrl-btn" id="shoot-down">↓</button>
            <button class="ctrl-btn" id="shoot-right">→</button>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("ruffle-container").appendChild(player);
        player.load("https://trapjawws.github.io/josh/The%20Binding%20of%20Isaac.swf");

        // The Fix: Map the UI ID to the KeyCode the game actually wants
        const buttonMap = {
            'move-up':    { code: 38, name: 'ArrowUp' },
            'move-down':  { code: 40, name: 'ArrowDown' },
            'move-left':  { code: 37, name: 'ArrowLeft' },
            'move-right': { code: 39, name: 'ArrowRight' },
            'shoot-up':   { code: 38, name: 'ArrowUp' },
            'shoot-down': { code: 40, name: 'ArrowDown' },
            'shoot-left': { code: 37, name: 'ArrowLeft' },
            'shoot-right':{ code: 39, name: 'ArrowRight' },
            'btn-space':  { code: 32, name: ' ' },
            'btn-shift':  { code: 16, name: 'Shift' }
        };

        function triggerKey(data, type) {
            const event = new KeyboardEvent(type, {
                key: data.name,
                code: data.name,
                keyCode: data.code,
                which: data.code,
                bubbles: true
            });
            window.dispatchEvent(event);
            player.dispatchEvent(event);
        }

        Object.keys(buttonMap).forEach(id => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerKey(buttonMap[id], 'keydown');
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                triggerKey(buttonMap[id], 'keyup');
            });
        });
    </script>
</body>
</html>
